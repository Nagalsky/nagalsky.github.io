	<main class="main">
		<section class="section">
			<div class="container">
				<div class="card">
					<div class="row no-gutters">
						<div class="col-md-6 bg-muted-thin">
							<div class="card-body">
						    <div class="gallery py-5" data-slick='{"autoplay": false, "autoplaySpeed": 3000, "arrows": false, "dots": true, "fade": true}'>
									<div class="gallery__item">
										<div class="gallery__badge">
										</div><!--gallery__badge-->
										<img src="assets/images/temp/slide-1.png" alt="" class="d-block img-fluid mx-auto">

									<div class="gallery__item">

									</div>
								</div><!--gallery-->
						  </div><!--card-body-->
						</div><!--col-->

						<div class="col-md-6 bg-muted">
							<div class="card-body card-body--bordered">
						    <form action="">
									<legend class="text-center">Leveringsadresse:</legend>
									<div class="form-group">
										<div class="row row--sm">
											<div class="col-sm-6 mb-4 mb-sm-0">
												<select name="" id="" class="form-control">
													<option value="">Størrelse</option>
													<option value="">Ipsum</option>
												</select>
											</div><!--col-->

											<div class="col-sm-6">
												<select name="" id="" class="form-control">
													<option value="">Farve</option>
													<option value="">Ipsum</option>
												</select>
											</div><!--col-->
										</div><!--row-->
									</div><!--form-group-->

									<div class="form-group">
										<div class="row row--sm">
											<div class="col-sm-6 mb-4 mb-sm-0">
												<input type="text" class="form-control" placeholder="Fornavn">
											</div><!--col-->

											<div class="col-sm-6">
												<input type="text" class="form-control" placeholder="Efternavn">
											</div><!--col-->
										</div><!--row-->
									</div><!--form-group-->

									<div class="form-group">
										<input type="text" class="form-control" placeholder="Adresse">
									</div><!--form-group-->

									<div class="form-group">
										<div class="row row--sm">
											<div class="col-sm-6 mb-4 mb-sm-0">
												<input type="text" class="form-control" placeholder="Postnummer">
											</div><!--col-->

											<div class="col-sm-6">
												<input type="text" class="form-control" placeholder="By">
											</div><!--col-->
										</div><!--row-->
									</div><!--form-group-->

									<div class="form-group">
										<input type="text" class="form-control" placeholder="Telefonnummer">
									</div><!--form-group-->

									<div class="form-group">
										<input type="text" class="form-control" placeholder="E-mail">
									</div><!--form-group-->

									<div class="form-group">
										<div class="form-check">
										  <input class="form-check-input" type="checkbox" value="" id="defaultCheck1">
										  <label class="form-check-label" for="defaultCheck1">Jeg accepterer handelsbetingelserne</label>
										</div><!--form-check-->
									</div><!--form-group-->

									<button type="submit" class="btn btn-warning btn-block font-semibold btn-md">Gå til betaling</button>
								</form>
						  </div><!--card-body-->
						</div><!--col-->
					</div><!--row-->
				</div><!--card-->
			</div><!--container-->
