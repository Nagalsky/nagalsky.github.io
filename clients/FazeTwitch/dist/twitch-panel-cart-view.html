<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta content="IE=edge" http-equiv="X-UA-Compatible">
	<meta name="format-detection" content="telephone=no">
	<link rel="stylesheet" href="assets/stylesheets/main.css">
	<title>Home page</title>
</head>

<body>

	<header class="header">
	  <div class="header__left text-truncate">
	    <a href="#" class="header__back">
	      <i class="faze-icon-arrow-left"></i>
	    </a>
	    <p class="header__title">FaZe Clan Shopping</p>
	  </div><!--header__left-->
	
	  <div class="header__right">
	    <a href="#" class="header__cart">
	      <i class="faze-icon-cart"></i>
	      <span class="header__cart-counter">1</span>
	    </a>
	  </div><!--header__right-->
	</header>

	<div class="alert alert-danger mb-0" role="alert">
	  10% off your first order
	</div>



	<main class="main">

		<section class="section">
			<div class="container">
				<div class="product-cart-item">
					<div class="row align-items-center">
						<div class="col-6">
							<img src="https://media.wanderset.com/media/rksq7f4i7.product-image-1.jpg" alt="" class="w-100">
						</div><!--col-->

						<div class="col-6">
							<p class="product-cart-item__title">2018 FaZe Clan Team Jersey $32</p>
							<p class="product-cart-item__title">
								<span class="d-block">Size: <span>Large</span></span>
								<span class="d-block">Color: <span>Black</span></span>
							</p>

							<div class="product-qty">
                <button type="button" class="btn product-qty__btn product-qty__btn--minus" field='quantity'>
                  <i class="faze-icon-minus"></i>
                </button>
                <input type='text' name='quantity' value='1' class='form-control product-qty__field' min="1" />
                <button type="button" class="btn product-qty__btn product-qty__btn--plus" field='quantity'>
                  <i class="faze-icon-plus"></i>
                </button>
              </div><!--product-qty-->

							<a href="#" class="product-cart-item__remove">Remove</a>
						</div><!--col-->
					</div><!--row-->
				</div><!--product-cart-item-->

				<div class="product-cart-item">
					<div class="row align-items-center">
						<div class="col-6">
							<img src="https://media.wanderset.com/media/rksq7f4i7.product-image-1.jpg" alt="" class="w-100">
						</div><!--col-->

						<div class="col-6">
							<p class="product-cart-item__title">2018 FaZe Clan Team Jersey $32</p>
							<p class="product-cart-item__title">
								<span class="d-block">Size: <span>Large</span></span>
								<span class="d-block">Color: <span>Black</span></span>
							</p>

							<div class="product-qty">
                <button type="button" class="btn product-qty__btn product-qty__btn--minus" field='quantity'>
                  <i class="faze-icon-minus"></i>
                </button>
                <input type='text' name='quantity' value='1' class='form-control product-qty__field' min="1" />
                <button type="button" class="btn product-qty__btn product-qty__btn--plus" field='quantity'>
                  <i class="faze-icon-plus"></i>
                </button>
              </div><!--product-qty-->

							<a href="#" class="product-cart-item__remove">Remove</a>
						</div><!--col-->
					</div><!--row-->
				</div><!--product-cart-item-->

				<div class="product-cart-item">
					<div class="row align-items-center">
						<div class="col-6">
							<img src="https://media.wanderset.com/media/rksq7f4i7.product-image-1.jpg" alt="" class="w-100">
						</div><!--col-->

						<div class="col-6">
							<p class="product-cart-item__title">2018 FaZe Clan Team Jersey $32</p>
							<p class="product-cart-item__title">
								<span class="d-block">Size: <span>Large</span></span>
								<span class="d-block">Color: <span>Black</span></span>
							</p>

							<div class="product-qty">
                <button type="button" class="btn product-qty__btn product-qty__btn--minus" field='quantity'>
                  <i class="faze-icon-minus"></i>
                </button>
                <input type='text' name='quantity' value='1' class='form-control product-qty__field' min="1" />
                <button type="button" class="btn product-qty__btn product-qty__btn--plus" field='quantity'>
                  <i class="faze-icon-plus"></i>
                </button>
              </div><!--product-qty-->

							<a href="#" class="product-cart-item__remove">Remove</a>
						</div><!--col-->
					</div><!--row-->
				</div><!--product-cart-item-->

				<hr class="mb-4">
				<h3 class="text-center mb-0">Subtotal <span>$64</span></h3>
				<hr class="mt-4">
				<p class="text-center fs-9 text-uppercase text-gray text-base-semibold kerning-2 mb-3">Checkout with</p>
				<a href="#" class="d-block">
					<img src="https://media.wanderset.com/media/by97jjns7.amazon-btn.png" alt="" class="w-100">
				</a>
			</div><!--container-->
		</section><!--section-->

	</main>


	<script src="assets/javascript/vendors.min.js"></script>
	<script src="assets/javascript/scripts.js"></script>



</body>
</html>
