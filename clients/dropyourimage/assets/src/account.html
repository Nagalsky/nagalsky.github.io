<!doctype html>
<html lang="ru">
<head>
    //= template/head.html
    <title>Account page</title>
</head>
<body>
    
    //= template/navigation.html

    <main class="main">
        <div class="container-fluid">
            <div class="d-flex align-items-center mb-1">
                <a href="#" class="font-opensans-bold d-inline-flex align-items-center ml-auto">Uitloggen <i class="icon-login fs-18 ml-1"></i></a>

                <button type="button" class="navigation__toggle">
                    <i class="icon-menu"></i>
                </button>
            </div>
            
            <h1 class="heading">Account</h1>

            <div class="account">
                <div class="account-nav">
                    <a href="#" class="account-nav__item active">Mijn gegevens</a>
                    <a href="#" class="account-nav__item">Meldingen</a>
                    <a href="#" class="account-nav__item">SFTP gegevens</a>
                    <a href="#" class="account-nav__item">Abonnementen</a>
                </div>

                <div class="account-body">
                    <div class="box box--xl">
                        <h3 class="mb-5">Account</h3>

                        <form action="">
                            <div class="row">
                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label for="form-field-bedrijfsnaam">Bedrijfsnaam</label>
                                        <input type="text" class="form-control" id="form-field-bedrijfsnaam" placeholder="De Menken Keuken B.V.">
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label for="form-field-contactpersoon">Contactpersoon</label>
                                        <input type="text" class="form-control" id="form-field-contactpersoon" placeholder="Hugo de Jonge">
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label for="form-field-E-mailadres">E-mailadres</label>
                                        <input type="email" class="form-control form-control--secondary" id="form-field-E-mailadres" placeholder="hugodej@hyves.nl">
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label>Branche</label>
                                        <select class="selectpicker" data-width="100%">
                                            <option>Groothandel</option>
                                            <option>Geen</option>
                                            <option>Communicatie</option>
                                            <option>Design</option>
                                            <option>Foto studio</option>
                                            <option>Fotografie</option>
                                            <option>Groothandel</option>
                                            <option>Marketing</option>
                                            <option>Merken</option>
                                            <option>Producenten</option>
                                            <option>Retail</option>
                                            <option>Tijdschriften</option>
                                            <option>Webshop</option>
                                            <option>Winkel</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <div class="d-flex align-items-center justify-content-between mb-2">
                                            <label class="mb-0 mr-4 flex-shrink-0" for="form-field-E-mailadres">Wachtwoord</label>
                                            <span class="btn-field-show-password hide">Wachtwoord wijzigen</span>
                                        </div>
                                        <input type="password" class="form-control form-control--secondary" id="form-field-E-mailadres" placeholder="Password">
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="row">
                                        <div class="col-sm-6 col-xxl-8">
                                            <div class="form-group">
                                                <label for="form-field-Straatnaam">Straatnaam</label>
                                                <input type="text" class="form-control" id="form-field-Straatnaam" placeholder="Edisonstraat">
                                            </div>
                                        </div>

                                        <div class="col-sm-6 col-xxl-4">
                                            <div class="form-group">
                                                <label for="form-field-Huisnummer">Huisnummer</label>
                                                <input type="text" class="form-control" id="form-field-Huisnummer" placeholder="2">
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label for="form-field-Telefoonnummer">Telefoonnummer</label>
                                        <input type="tel" class="form-control" id="form-field-Telefoonnummer" placeholder="+31 06 74958758">
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label for="form-field-Postcode">Postcode</label>
                                        <input type="email" class="form-control" id="form-field-Postcode" placeholder="2171 TV">
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label for="form-field-Btw-nummer">Btw-nummer</label>
                                        <input type="tel" class="form-control" id="form-field-Btw-nummer" placeholder="">
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label for="form-field-Plaats">Plaats</label>
                                        <input type="email" class="form-control" id="form-field-Plaats" placeholder="Sassenheim">
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label for="form-field-KvK-nummer">KvK-nummer</label>
                                        <input type="tel" class="form-control" id="form-field-KvK-nummer" placeholder="34183941">
                                    </div>
                                </div>

                                <div class="col-sm-6">
                                    <div class="form-group">
                                        <label for="form-field-Land">Land</label>
                                        <input type="email" class="form-control" id="form-field-Land" placeholder="Nederland">
                                    </div>
                                </div>
                            </div>

                            <div class="text-right">
                                <button type="submit" class="btn btn-primary btn-lg btn-long-lg">Opslaan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    //= template/modals.html

    //= template/scripts-dependencies.html
</body>
</html>
