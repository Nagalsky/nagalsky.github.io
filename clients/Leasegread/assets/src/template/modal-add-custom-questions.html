<!-- Modal -->
<div class="modal fade" id="modal-add-custom-question" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="text-blue800 m-0">Add Custom Questions</h3>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form action="">
                    <div class="form-group mb-3">
                        <textarea class="form-control form-control--placeholder-secondary" name="" id="" cols="" rows="" placeholder="Will they cause trouble with the neighbors?"></textarea>
                    </div>

                    <div class="dropzone mb-4">
                        <input type="file" name="file" id="file" />
                        <label for="file" class="dropzone__label">
                            <div class="d-flex align-items-center">
                                <i class="icon-upload-cloud mr-3 fs-20"></i>
                                <span>Choose a file</span>
                            </div>
                        </label>
                    </div>

                    <div class="d-flex">
                        <button type="submit" class="btn btn-secondary btn-md mr-4">Add</button>
                        <button type="button" class="btn btn-outline-blue btn-md" data-dismiss="modal">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
