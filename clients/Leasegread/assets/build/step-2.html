<!doctype html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" href="css/main.min.css">

<body>

    <main class="main">
        <header class="page-step-header page-step-header--step-2" style="background-image: url('img/bg/page-step-header-bg.jpg');">

                        <label class="mb-3">Will they cause trouble with the neighbors?</label>
                        <div class="box-fields">

                                <input type="radio" name="box-field-step-page-2-1" id="box-field-step-page-2-1">

                            </div>

                            </div>

                            </div>
                        </div>
                    </div>

                    <div class="form-group mb-md-5">
                        <label class="mb-3" for="form-field-textarea">Will they cause trouble with the neighbors?</label>
                        <textarea name="" id="form-field-textarea" cols="" rows="" class="form-control bg-blue200 border-0"></textarea>
                    </div>

                    <div class="form-group mb-md-5">
                        <label class="mb-3">Are they likely to pay on-time?</label>
                        <div class="box-fields">
                            <div class="box-field box-field--sm">
                                <input type="radio" name="box-field-step-page-2-2" id="box-field-step-page-2-1-1">
                                <label class="box-field__label w-auto" for="box-field-step-page-2-1-1">Yes</label>
                            </div>
                            <div class="box-field box-field--sm">
                                <input type="radio" name="box-field-step-page-2-2" id="box-field-step-page-2-1-2">
                                <label class="box-field__label w-auto" for="box-field-step-page-2-1-2">No</label>
                            </div>
                        </div>
                    </div>

                    <div class="form-group mb-md-5">
                        <label class="mb-3">Will they cause trouble with the neighbors?</label>
                        <div class="box-fields">
                            <div class="box-field">
                                <input type="radio" name="box-field-step-page-2-3" id="box-field-step-page-2-3-1">
                                <label class="box-field__label" for="box-field-step-page-2-3-1">10k - 15k month</label>
                            </div>
                            <div class="box-field">
                                <input type="radio" name="box-field-step-page-2-3" id="box-field-step-page-2-3-2">
                                <label class="box-field__label" for="box-field-step-page-2-3-2">15k - 20k month</label>
                            </div>
                            <div class="box-field">
                                <input type="radio" name="box-field-step-page-2-3" id="box-field-step-page-2-3-3">
                                <label class="box-field__label" for="box-field-step-page-2-3-3">20k+ month</label>
                            </div>
                        </div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-gradient-blue has-shadow">Submit</button>
                    </div>
                </form>
            </div>
        </div>

        <footer class="page-step-footer px-md-5">
            <div class="container-fluid">
                <div class="d-flex flex-column flex-sm-row justify-content-sm-between align-items-center">
                    <a href="#" class="page-step-footer__link">Support</a>
                    <a href="#" class="page-step-footer__link">www.Leasegred.com</a>
                    <a href="#" class="page-step-footer__link">Terms & Condition</a>

    <script src="js/main.min.js"></script>
