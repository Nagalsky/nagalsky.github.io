<!doctype html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" href="css/main.min.css">
    <title>Welcome back</title>
</head>

<body>

    <main class="main">
        <div class="account">
            <div class="account__aside">
                <div class="account__aside__header">
                    <a href="#" class="account__aside__logo">
                        <img src="img/elements/logo.svg" alt="" class="w-100">
                    </a>
                    <div class="dropdown">
                        <a class="account__aside__dropdown" href="#" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Eng</a>

                        <div class="dropdown-menu dropdown-menu-right">
                            <a class="dropdown-item" href="#">Ru</a>
                            <a class="dropdown-item" href="#">Fr</a>
                            <a class="dropdown-item" href="#">It</a>
                        </div>
                    </div>
                </div>

                <div class="account__aside__body">
                    <h1 class="mb-3 account__aside__heading">Welcome Back!</h1>

                    <div class="row mb-5">
                        <div class="col-xl-9">
                            <p class="fs-16 text-gray100 font-base-semibold">There are many variations of passages of Lorem Ipsum available, but the majority have suffered</p>
                        </div>
                    </div>

                    <form action="">
                        <div class="form-group">
                            <input type="email" class="form-control" placeholder="Email Address">
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-control" placeholder="Password">
                        </div>

                        <p class="mb-4 fs-16 font-base-semibold"><a href="#" class="text-gray100 underline">Forgot Password?</a></p>

                        <div class="d-flex flex-column flex-xl-row align-items-center">
                            <button type="submit" class="btn btn-gradient-blue fs-16 mr-3">Sign up</button>

                            <b class="mx-4 my-3 my-xl-0 fs-18">or</b>

                            <div class="simple-login-buttons flex-fill justify-content-end">
                                <a href="#" class="simple-login-button simple-login-button--xl">
                                    <i class="icon-facebook"></i>
                                </a>
                                <a href="#" class="simple-login-button simple-login-button--xl">
                                    <i class="icon-twitter"></i>
                                </a>
                                <a href="#" class="simple-login-button simple-login-button--xl">
                                    <i class="icon-google"></i>
                                </a>
                            </div>
                        </div>
                    </form>

                    <div class="account__aside__spacer"></div>

                    <h3>Don’t have an account?</h3>
                    <a href="#" class="btn btn-secondary fs-16">Create a Free Account</a>
                </div>

                <div class="account__aside__footer">
                    <p class="m-0">2020-2021 All Rights Reserved.</p>
                    <a href="#" class="text-gray100 flex-shrink-0 ml-4">Support</a>
                </div>
            </div>

            <div class="account__body">
                <!-- Swiper -->
                <div class="swiper-container account__body__gallery" id="account-gallery">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide" style="background-image: url('img/bg/create-account-bg.jpg');">
                            <img src="img/temp/create-accoung-gallery-1@2.png" alt="" class="img-fluid">
                        </div>
                        <div class="swiper-slide" style="background-image: url('img/bg/welcome-back-bg.jpg');">
                            <img src="img/temp/create-accoung-gallery-2@2.png" alt="" class="img-fluid">
                        </div>
                        <div class="swiper-slide" style="background-image: url('img/bg/forgot-pass-bg.jpg');">
                            <img src="img/temp/create-accoung-gallery-3@2.png" alt="" class="img-fluid">
                        </div>
                        <div class="swiper-slide" style="background-image: url('img/bg/reset-password.jpg');">
                            <img src="img/temp/create-accoung-gallery-4@2.png" alt="" class="img-fluid">
                        </div>
                    </div>
                    <!-- Add Pagination -->
                    <div class="swiper-pagination"></div>
                </div>
            </div>
        </div>
    </main>


    <script src="js/main.min.js"></script>
</body>

</html>
