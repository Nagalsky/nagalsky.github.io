<!doctype html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta name="format-detection" content="telephone=no">
    <link rel="stylesheet" href="css/main.min.css">
    <title>Applicant create new</title>
</head>

<body>

    <main class="main">
        <div class="aside-overlay"></div>
        
        <aside class="aside">
            <a href="#" class="aside__logo">
                <img src="img/elements/logo.svg" alt="" class="w-100">
            </a>
        
            <div class="aside__nav">
                <a href="#" class="aside__nav__item active">
                    <span class="aside__nav__item__rounded-corner"></span>
                    <span class="aside__nav__inner"><i class="icon-dashboard aside__nav__icon"></i> Dashboard</span>
                </a>
                <a href="#" class="aside__nav__item">
                    <span class="aside__nav__item__rounded-corner"></span>
                    <span class="aside__nav__inner"><i class="icon-applicant aside__nav__icon"></i> Applicant</span>
                </a>
                <a href="#" class="aside__nav__item">
                    <span class="aside__nav__item__rounded-corner"></span>
                    <span class="aside__nav__inner"><i class="icon-questions aside__nav__icon"></i> Questions</span>
                </a>
            </div>
        
            <div class="aside__footer">
                <a href="#" class="aside__nav__item">
                    <span class="aside__nav__inner"><i class="icon-questions-rounded aside__nav__icon"></i> Support</span>
                </a>
            </div>
        </aside>

        <div class="wrapper">
            <header class="header">
                <a href="#" class="header__logo">
                    <img src="img/elements/logo-xs.svg" class="w-100" alt="">
                </a>

                <h1 class="h3 m-0 d-none d-md-block text-blue800">Create New Applicant</h1>

                <div class="header__panel">
                    <a href="#" class="btn btn-gradient-blue has-shadow px-3 px-sm-4">Add Applicant</a>
                    <div class="header__buttons">
                        <a href="#" class="header__button">
                            <span class="header__button__indicator"></span>
                            <i class="icon-bell"></i>
                        </a>
                        <a href="#" class="header__button">
                            <i class="icon-settings"></i>
                        </a>
                        <a href="#" class="header__button header__button-toggle-aside">
                            <i class="icon-menu"></i>
                        </a>
                    </div>
                </div>
            </header>

            <div class="wrapper-content">
                <h1 class="h3 d-md-none text-blue800">Create New Applicant</h1>

                <div class="d-flex justify-content-end mb-4 mb-md-5">
                    <button type="button" class="close"></button>
                </div>

                <div class="box box--sky box--rounded mb-4">
                    <div class="steps">
                        <div class="step step--is-active">
                            <div class="step__inner">
                                Add<br class="d-none d-sm-inline-block" /> Applicant
                            </div>
                        </div>

                        <div class="step">
                            <div class="step__inner">
                                Add<br class="d-none d-sm-inline-block" /> Referense Type
                            </div>
                        </div>

                        <div class="step">
                            <div class="step__inner">
                                Send<br class="d-none d-sm-inline-block" /> Questions
                            </div>
                        </div>
                    </div>
                </div>

                <div class="table-box">
                    <table data-toggle="table" data-classes="table bootstrap-table" data-pagination="true" data-page-size="14">
                        <thead>
                            <tr>
                                <th scope="col">Name</th>
                                <th scope="col">Property</th>
                                <th scope="col">Type</th>
                                <th scope="col">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="table-parent-row">
                                <th>
                                    Chandravadan Karmakar
                                </th>
                                <td>jacobokoening@gmail.com</td>
                                <td>+1 456 2354 8564</td>
                                <td>
                                    <div class="table-buttons">
                                        <button type="button" class="table-button table-button-edit"><i class="icon-edit"></i></button>
                                        <button type="button" class="table-button table-button-delete"><i class="icon-delete"></i></button>
                                    </div>
                                </td>
                            </tr>
                            <tr class="table-child-row">
                                <td colspan="4">
                                    <div class="box box--muted mb-3">
                                        <form>
                                            <div class="form-row">
                                                <div class="col-xl-3 col-sm-3 mb-3 mb-sm-0">
                                                    <input type="text" class="form-control" placeholder="Name">
                                                </div>
                                                <div class="col-xl-5 col-sm-4 mb-3 mb-sm-0">
                                                    <input type="email" class="form-control" placeholder="Email">
                                                </div>
                                                <div class="col-xl-3 col-sm-3 mb-3 mb-sm-0">
                                                    <input type="tel" class="form-control" placeholder="Mobile Number">
                                                </div>
                                                <div class="col-xl-1 col-sm-2 d-flex">
                                                    <button type="submit" class="btn btn-secondary px-sm-1 table-btn-form">Add</button>
                                                </div>
                                            </div>
                                        </form>
                                    </div>

                                    <div class="box box--muted mb-5">
                                        <form class="form-secondary">
                                            <div class="input-group">
                                                <div class="input-group-prepend">
                                                    <div class="input-group-text">Property Address</div>
                                                </div>
                                                <input type="text" class="form-control" placeholder="Placeholder" value="3 Park Heath Cottages, Park Heath, Cheswardine, TF9 2NR">
                                            </div>
                                        </form>
                                    </div>

                                    <div class="text-center">
                                        <a href="#" class="btn btn-gradient-blue">Continue</a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.min.js"></script>


</body>

</html>
