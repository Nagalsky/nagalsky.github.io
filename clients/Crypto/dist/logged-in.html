<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>

	<meta name="format-detection" content="telephone=no">
	<link rel="stylesheet" href="assets/stylesheets/main.css">

<body>

	<div class="info">
	  Curated Cryptocurrency News

	<header class="header">
	  <div class="header__top">
	    <a class="header__logo" href="#">
	      <img src="assets/images/elements/logo-dark.png" alt="" class="w-100 header__logo__image-dark">
	      <img src="assets/images/elements/logo-light.png" alt="" class="w-100 header__logo__image-light">
	    </a>
	
	    <div class="d-none d-md-block">
	      <div class="dropdown header__user">
	        <a href="#" class="dropdown-toggle d-inline-flex align-items-center" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
	          <img src="assets/images/elements/man.svg" alt="" class="header__user-avatar">
	          <span class="header__user-name">Susie Mendoza</span>
	        </a>
	        <div class="dropdown-menu dropdown-menu-right">

	          <a class="dropdown-item" href="#"><i class="dropdown-item__icon crypto-icon-notifications"></i> Alerts</a>

	    </div>

	            <button class="btn-submit btn-reset">
	              <i class="crypto-icon-search"></i>

	              <i class="crypto-icon-cancel-rounded"></i>

	      <a href="#" class="header__btn btn-switch-themes-toggle transition-0">
	        <i class="crypto-icon-night"></i>

	      <a href="#" class="header__btn transition-0">
	        <i class="crypto-icon-menu"></i>
	      </a>

	      <form action="" class="mr-3">

	          <button class="btn-submit btn-reset">
	            <i class="crypto-icon-search"></i>
	          </button>
	        </div><!--form-group-->
	      </form>
	      <a href="#" class="header__btn btn-switch-themes-toggle transition-0">
	        <i class="crypto-icon-night"></i>
	      </a>
	    </div><!--d-flex-->
	
	    <div class="d-md-none">
	      <div class="dropdown header__user">
	        <a href="#" class="dropdown-toggle d-inline-flex align-items-center" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
	          <img src="assets/images/elements/man.svg" alt="" class="header__user-avatar">

	        <div class="dropdown-menu dropdown-menu-right">
	          <a class="dropdown-item" href="#"><i class="dropdown-item__icon crypto-icon-account"></i> My Profile</a>

	        </div>
	      </div><!--dropdown-->
	    </div><!--d-flex-->
	  </div><!--header__bottom-->
