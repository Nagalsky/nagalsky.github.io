<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
	//= template/head.html
	<title>Contact page</title>
</head>

<body>

	//= template/info.html

	//= template/header-contact.html



	<main class="main">

		<section class="section pt-0">
			<div class="container-fluid">
				<div class="row no-gutters">
					<div class="col-lg-9">
						<div class="content-holder">
							<div class="content-holder__body content-holder__body--lg">
								<h1 class="h5 mb-2">Contact</h1>
								<p class="font-medium">At Coin Break, we have actual humans who will read and respond to your emails. Don't be shy!</p>

								<form action="">
									<div class="row">
										<div class="col-md-4">
											<div class="form-group">
												<label for="field-full-name">Full name</label>
												<input type="text" class="form-control" id="field-full-name">
											</div><!--form-group-->
										</div>

										<div class="col-md-4">
											<div class="form-group">
												<label for="field-email">Email</label>
												<input type="email" class="form-control" id="field-email">
											</div><!--form-group-->
										</div>

										<div class="col-md-4">
											<div class="form-group">
												<label for="">Select topic</label>
												<select class="selectpicker" data-style="btn-brand-secondary btn-lg transition-0" data-width="100%">
												  <option>Trending</option>
												  <option>Popular</option>
												  <option>All Stories</option>
												</select>
											</div><!--form-group-->
										</div>
									</div><!--row-->

									<div class="form-group">
										<label for="field-message">Message</label>
										<textarea name="" id="" cols="" rows="" class="form-control"></textarea>
										<p class="text-right field-counter">0/200</p>
									</div><!--form-group-->

									<div class="content-holder__body__divider content-holder__body__divider--full-width"></div>

									<button type="submit" class="btn btn-xl btn-success btn-sm-block">Send</button>
								</form>
							</div><!--content-holder__body-->
						</div><!--content-holder-->
					</div><!--col-->

					<div class="col-lg-3">
						//= template/aside.html
					</div><!--col-->
				</div><!--row-->
			</div><!--container-fluid-->
		</section>

	</main>


	//= template/footer.html



	//= template/scripts-dependencies.html



</body>
</html>
