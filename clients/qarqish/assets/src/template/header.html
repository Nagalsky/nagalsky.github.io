<header class="header">
    <div class="container">
        <div class="header__left">
            <a href="#" class="header__logo">
                <img src="img/elements/logo.png" alt="" class="w-100">
            </a>

            <a href="#" class="btn btn-brand btn-header btn-has-shadow text-uppercase">Start selling</a>

            <form action="" class="header__form">
                <div class="form-group">
                    <input type="search" class="form-control" placeholder="Search">
                    <button type="submit" class="btn btn-submit">
                        <i class="qarqish-icon-search"></i>
                    </button>
                </div>
            </form>
        </div>

        <div class="header__actions">
            <a href="#" class="header__link">
                <i class="qarqish-icon-shopping-cart"></i>
                <span class="header__cart-counter">0</span>
            </a>
            <a href="#" class="header__link">
                <i class="qarqish-icon-sign-in"></i>
            </a>
            <form action="" class="header__lang-form">
                <select name="" id="" class="form-control">
                    <option selected="" value="en">English</option>
                    <option value="ar">Arabic</option>
                </select>
            </form>
            <a href="#" class="header__link">
                <i class="qarqish-icon-question-circle"></i>
            </a>
        </div>
    </div>
</header>
