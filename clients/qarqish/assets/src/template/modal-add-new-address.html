<!-- Modal -->
<div class="modal fade" id="modal-add-new-address" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add new address</h5>
                <button type="button" class="close" data-dismiss="modal">
                    <i class="qarqish-icon-close"></i>
                </button>
            </div>
            <div class="modal-body">
                <form action="">
                    <div class="form-group">
                        <label for="modal2-form-field-title">Title</label>
                        <input type="text" class="form-control" id="modal2-form-field-title"
                            placeholder="Write title name">
                    </div>

                    <div class="form-group">
                        <label for="modal2-form-field-address1">Address</label>
                        <input type="text" class="form-control" id="modal2-form-field-address1"
                            placeholder="Enter address here">
                    </div>

                    <div class="form-group">
                        <label for="modal2-form-field-select-delivery-area">Delivery Area</label>
                        <select class="form-control" name="" id="modal2-form-field-select-delivery-area">
                            <option value="">Select Delivery Area</option>
                            <option value="">My house 2</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="modal2-form-field-address">Phone Number</label>
                        <input type="tel" class="form-control" id="modal2-form-field-address"
                            placeholder="Enter phone number">
                    </div>

                    <div class="form-group">
                        <div class="custom-control custom-switch custom-switch-reverse">
                            <input type="checkbox" class="custom-control-input" id="customSwitch1">
                            <label class="custom-control-label" for="customSwitch1">Primary Address</label>
                        </div>
                    </div>

                    <button type="button" class="btn btn-orange" data-dismiss="modal">Save</button>
                </form>
            </div>
        </div>
    </div>
</div>
