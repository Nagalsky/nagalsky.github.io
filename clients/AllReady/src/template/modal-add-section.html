<!-- Modal form -->
<div class="modal modal--has-bg fade" id="modal-add-section" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-body">
        <h2>Add Section</h2>
        <form action="">
          <div class="form-group">
            <label for="field-section-name">Section Name:</label>
            <input type="text" class="form-control" id="field-section-name">
          </div><!--form-group-->

          <div class="form-group">
            <div class="checkbox-holder checkbox-holder--inline">
              <input type="checkbox" id="checkobox-modal-11">
              <label class="checkbox__label" for="checkobox-modal-11">
                Published
              </label><!--checkbox__label-->
            </div><!--checkbox-holder-->

            <div class="checkbox-holder checkbox-holder--inline">
              <input type="checkbox" id="checkobox-modal-12">
              <label class="checkbox__label" for="checkobox-modal-12">
                Include in menu
              </label><!--checkbox__label-->
            </div><!--checkbox-holder-->

            <div class="checkbox-holder checkbox-holder--inline">
              <input type="checkbox" id="checkobox-modal-13">
              <label class="checkbox__label" for="checkobox-modal-13">
                Height 100%
              </label><!--checkbox__label-->
            </div><!--checkbox-holder-->
          </div><!--form-group-->

          <div class="form-group">
            <label for="field-select">Section Type</label>
            <div class="row">
              <div class="col-md-6">
                <select name="" id="field-select" class="form-control">
                  <option selected hidden>Select an option</option>
                  <option value="">Lorem</option>
                  <option value="">Ipsum</option>
                </select>
              </div><!--col-->
            </div><!--row-->
          </div><!--form-group-->
        </form>
      </div><!--modal-body-->

      <div class="modal-footer pt-0">
        <button type="button" class="btn btn-outline-muted" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success">Add</button>
      </div><!--modal-footer-->
    </div><!--modal-dialog-->
  </div><!--modal-dialog-->
</div><!--modal-->
