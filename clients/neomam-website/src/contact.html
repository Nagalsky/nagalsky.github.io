<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta content="IE=edge" http-equiv="X-UA-Compatible">
	<meta name="format-detection" content="telephone=no">
	<link rel="icon" href="favicon.ico" type="image/x-icon"/>
	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon"/>
	<title>Contact page</title>
	<link rel="stylesheet" href="assets/stylesheets/main.css">
</head>

<body>

	//= template/navbar.html



	<main class="main">

		<section class="section section--sm has-bg" style="background-image:url('assets/images/bg/map-xl.jpg');">
			<div class="container">
				<h1 class="h2 font-base-black text-white text-uppercase">Contact Us</h1>
				<h4 class="font-base-light text-white">Get in touch with us via the form below and we’ll get straight<br class="hidden-md-down"> back to you.</h4>

				<div class="row">
					<div class="col-md-6 mb-4 mb-md-0">
						<div class="card card--xl card--border-top mb-0">
						  <div class="card-block">
								<form action="">
									<div class="form-group">
										<label for="inputFullName">Full Name</label>
			    					<input type="text" class="form-control" id="inputFullName" placeholder="Your Name">
									</div><!--form-group-->

									<div class="form-group">
										<label for="inputEmail">Email</label>
			    					<input type="email" class="form-control" id="inputEmail" placeholder="Your Email">
									</div><!--form-group-->

									<div class="form-group">
										<label for="inputMessage">Message</label>
										<textarea name="" id="inputMessage" cols="" rows="" class="form-control" placeholder="How can we help you?">
										</textarea>
									</div><!--form-group-->

									<button type="submit" class="btn btn-primary">Send Message <i class="neomam-icon-right-1"></i></button>
								</form>
						  </div><!--card-block-->
						</div><!--card-->
					</div><!--col-->

					<div class="col-md-6">
						<div class="d-flex align-items-center align-items-sm-start">
							<div class="box-icon box-icon--primary box-icon--md mr-4">
								<i class="box-icon__icon neomam-icon-mail"></i>
							</div><!--box-icon-->
							<div class="mt-sm-2">
								<p class="font-base-regular fs-18 text-white current-color"><a href="mailto:hello@neomam.com">hello@neomam.com</a></p>
							</div>
						</div><!--d-md-flex-->

						<div class="d-flex align-items-center align-items-sm-start mt-4">
							<div class="box-icon box-icon--primary box-icon--md mr-4">
								<i class="box-icon__icon neomam-icon-phone"></i>
							</div><!--box-icon-->
							<div class="mt-sm-2">
								<p class="font-base-regular fs-18 text-white current-color"><a href="tel:+44 161 236 7370">+44 161 236 7370</a></p>
							</div>
						</div><!--d-md-flex-->

						<div class="d-flex align-items-center align-items-sm-start mt-4">
							<div class="box-icon box-icon--primary box-icon--md mr-4">
								<i class="box-icon__icon neomam-icon-location"></i>
							</div><!--box-icon-->
							<div class="mt-sm-2">
								<p class="font-base-regular fs-18 text-white">20 Dale Street Manchester, M1 1EZ</p>
							</div>
						</div><!--d-md-flex-->
					</div><!--col-->
				</div><!--row-->
			</div><!--container-->
		</section><!--section-->

	</main>


	//= template/footer.html


	//= template/scripts-dependencies.html



</body>
</html>
