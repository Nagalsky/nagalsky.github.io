<header class="header">
    <div class="container">
        <a href="#" class="header__logo">
            <img src="img/elements/logo.png" alt="" class="w-100">
        </a>

        <div class="header__account">
            <div class="header__sign-in">
                <a href="#" class="header__sign-in__icon">
                    <i class="icon-user"></i>
                </a>
                <div class="flex-fill d-none d-md-block">
                    <a href="#" class="header__sign-in__link">Sign In</a>
                    <p class="header__create-account">or <a href="#" class="text-reset">Create Account</a></p>
                </div>
            </div>

            <a href="#" class="header__card">
                <i class="icon-shopping-cart"></i>
                <span class="badge bg-danger rounded-pill">0</span>
            </a>
        </div>

        <div id="typeahead-form" class="header__typeahead-form typeahead-form">
            <input class="form-control typeahead" type="text" placeholder="Search By Keyword, Part or Part #">
            <i class="typeahead-form__icon icon-search"></i>
        </div>
    </div>
</header>
