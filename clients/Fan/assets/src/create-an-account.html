<!doctype html>
<html lang="ru">

<head>
    //= template/head.html
    <title>Create an account page</title>
</head>

<body>
    //= template/navbar.html

    <main class="main">
        <section class="section">
            <div class="container">
                <p class="text-center fs-18 mb-1 text-blue200 font-circular-std-book">Welcome to Strom for fan</p>
                <h1 class="h2 text-center text-black text-capitalize">Create an account</h1>

                <form action="" class="form-box">
                    <div class="form-group">
                        <label for="field-first-name">First Name</label>
                        <input type="text" class="form-control" placeholder="eg. John" id="field-first-name">
                    </div>

                    <div class="form-group">
                        <label for="field-last-name">Last Name</label>
                        <input type="text" class="form-control" placeholder="eg. Doe" id="field-last-name">
                    </div>

                    <div class="form-group">
                        <label for="field-email">Email</label>
                        <input type="email" class="form-control" placeholder="eg.someone@gmail.com" id="field-email">
                    </div>

                    <div class="form-group">
                        <label for="field-tel">Phone Number</label>
                        <input type="tel" oninput="this.value = this.value.replace(/[^0-9-+.]/g, ''); this.value = this.value.replace(/(\..*)\./g, '$1');" class="form-control" placeholder="eg. +45 342 3243 3243" id="field-tel">
                    </div>

                    <div class="form-group">
                        <label for="field-password">Password</label>
                        <input type="password" class="form-control" placeholder="Password" id="field-password">
                        <div class="invalid-feedback d-block">
                            Password must be 6 characters or more
                        </div>
                    </div>

                    <button type="submit" class="btn btn-block btn-danger fs-18 mt-4 px-3 font-bergentext-semibold d-flex align-items-center justify-content-center">Sign Up</button>
                    <p class="my-4 text-center text-uppercase text-muted">OR</p>
                    <button type="button" class="btn btn-block btn-fb fs-18 px-3 font-bergentext-semibold d-flex align-items-center justify-content-center"><i class="icon-facebook-circle mr-3 fs-20"></i> Register with Facebook</button>
                </form>

                <div class="text-center mt-4">
                    <p class="fs-16 text-muted font-circular-std-book">Already have an account? <a href="#" class="text-danger100 font-circular-std-black ml-2">Log in here</a></p>
                </div>
            </div>
        </section>
    </main>

    //= template/footer.html

    <div></div>

    //= template/scripts-dependencies.html
</body>

</html>
