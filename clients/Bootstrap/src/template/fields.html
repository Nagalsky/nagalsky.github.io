<section class="section--styleguide">
	<div class="container">
		<h1>Fields</h1>

		<form>
		  <div class="form-group">
		    <label for="exampleInputEmail1">Email address</label>
				<a href="#" class="form-sublink">Sublink</a>
		    <input type="email" class="form-control form-control--mutted" id="exampleInputEmail1" placeholder="Enter email">
		  </div><!-- form-group -->

			<div class="form-group">
		    <label for="exampleInputEmail2">Email address</label>
				<a href="#" class="form-sublink">Sublink</a>
				<small id="emailHelp2" class="form-text">We'll never share your email with anyone else.</small>
		    <input type="email" class="form-control" id="exampleInputEmail2" aria-describedby="emailHelp2" placeholder="Enter email">
		  </div><!-- form-group -->

			<div class="form-group">
		    <label for="searchEmail">Search field</label>
				<div class="form-group--search form-group--search--left">
					<input type="email" class="form-control" id="searchEmail" placeholder="Search">
					<button type="submit" class="btn-submit">
						<i class="bootstrap-themes-icon-search"></i>
					</button>
				</div><!-- form-group--search -->
		  </div><!-- form-group -->

			<div class="form-group">
		    <label for="searchEmail2">Search field</label>
				<div class="form-group--search form-group--search--right">
					<input type="email" class="form-control" id="searchEmail2" placeholder="Search">
					<button type="submit" class="btn-submit">
						<i class="bootstrap-themes-icon-search"></i>
					</button>
				</div><!-- form-group--search -->
		  </div><!-- form-group -->

			<div class="form-group has-danger">
			  <label class="form-control-label" for="inputDanger1">Input with danger</label>
			  <input type="text" class="form-control form-control-danger" id="inputDanger1">
				<small class="form-text form-control-feedback">This field is required.</small>
			</div><!-- form-group -->

			<div class="form-group has-warning">
			  <label class="form-control-label" for="inputWarning1">Input with warning</label>
			  <input type="text" class="form-control form-control-warning" id="inputWarning1">
			  <small class="form-text form-control-feedback">Example help text that remains unchanged.</small>
			</div><!-- form-group -->

			<div class="form-group has-success">
			  <label class="form-control-label" for="inputSuccess1">Input with success</label>
			  <input type="text" class="form-control form-control-success" id="inputSuccess1">
			  <small class="form-text form-control-feedback">Example help text that remains unchanged.</small>
			</div><!-- form-group -->
		</form>

		<form class="form-inline">
		  <div class="form-group">
		    <label class="sr-only">Email</label>
		    <p class="form-control-static">email@example.com</p>
		  </div>
		  <div class="form-group mx-sm-3">
		    <label for="inputPassword2" class="sr-only">Password</label>
		    <input type="password" class="form-control" id="inputPassword2" placeholder="Password">
		  </div>
		  <button type="submit" class="btn btn-brand">Confirm identity</button>
		</form>
	</div><!-- container -->
</section><!-- section--styleguide -->
