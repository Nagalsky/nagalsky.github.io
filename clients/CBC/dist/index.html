<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta name="format-detection" content="telephone=no">
  <link rel="stylesheet" href="assets/stylesheets/main.css">
  <title>Home page</title>
</head>

<body>
  <header class="header">
    <div class="container-fluid">
      <div class="header__inner">
        <a href="#" class="header__logo">
          <img src="assets/images/elements/logo.svg" alt="" class="w-100">
        </a>
        
        <a href="#" class="header__menu-toggle">
          <i class="cbc-icon-menu"></i>
        </a>
  
        <form class="header__form d-none d-lg-block">
          <label for="field-email">Sign up for our news</label>
          <div class="form-group d-flex mb-0">
            <input type="text" class="form-control flex-1" placeholder="EMAIL">
            <button type="submit" name="button" class="btn btn-submit">
              <i class="cbc-icon-play"></i>
            </button>
          </div>
        </form>
      </div>
    </div>
  </header>

  <div class="menu" id="menu">
    <a href="#" class="menu__close cbc-icon-close"></a>
  </div>

  <main class="main">
    <section class="hero" style="background-image:url('assets/images/temp/hero-1.jpg')">
      <div class="hero__content">
        <div class="container">
          <h1 class="hero__title">TAKE A BREAK</h1>
        </div>
      </div>
    </section>
  </main>

  Footer


  <script src="assets/javascript/vendors.min.js"></script>
  <script src="assets/javascript/scripts.js"></script>
</body>

</html>
