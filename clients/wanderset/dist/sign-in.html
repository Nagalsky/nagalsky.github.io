<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta name="format-detection" content="telephone=no">
  <link rel="icon" href="favicon.ico" type="image/x-icon"/>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon"/>
  <title>Sign in page</title>
  <link rel="stylesheet" href="assets/stylesheets/main.css">
</head>

<body class="has-without-header">


  <main class="main">

    <section class="section section--xl">

      <a href="#" class="logo logo--content">
        wander<span class="logo__span">set</span>
      </a>

      <div class="container container--mini">
        <form action="">
          <p class="text-center l-n fs15 text-muted font-base-book mb-4">Sign in to your account.</p>
          <div class="form-group">
            <input type="name" class="form-control" placeholder="username">
          </div><!-- form-group -->

          <div class="form-group mb20">
            <input type="password" class="form-control" placeholder="password">
          </div><!-- form-group -->

          <button type="submit" class="btn btn-primary btn-block">login</button>
          <p class="text-center l-n fs13 font-base-book mt7 mb23">
            <a href="#" class="link-dark text-transform-normal">Forgot password?</a>
          </p>
          <p class="text-center text-transform-normal text-gray l-n fs13 font-base-book mb-2">Do not have an account?</p>
          <button type="submit" class="btn btn-secondary btn-block">create account</button>
        </form>
      </div><!-- container -->

    </section><!-- section -->

  </main>



  <a href="#" class="btn-scroll-top">
    <i class="wanderset-icon-up-open btn-scroll-top__icon"></i>
  </a>



  <script src="../bower_components/jquery/dist/jquery.js"></script>
  <script src="../bower_components/slick-carousel/slick/slick.min.js"></script>
  <script src="../bower_components/sticky-kit/jquery.sticky-kit.min.js"></script>
  <script src="../bower_components/isotope/dist/isotope.pkgd.min.js"></script>
  
  <script src="../bower_components/bootstrap-select/dist/js/bootstrap-select.min.js"></script>
  <script src="../bower_components/tether/dist/js/tether.min.js"></script>
  <script src="../bower_components/bootstrap/dist/js/bootstrap.min.js"></script>
  <script src="assets/javascript/scripts.js"></script>



</body>
</html>
