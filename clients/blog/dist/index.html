<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta content="IE=edge" http-equiv="X-UA-Compatible">
	<meta name="format-detection" content="telephone=no">
	<link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet" integrity="sha384-wvfXpqpZZVQGK6TAh5PVlGOfQNHSoD2xbE+QkPxCAFlNEevoEH3Sl0sibVcOQVnN" crossorigin="anonymous">
	<link rel="stylesheet" href="assets/stylesheets/main.css">
	<title>Home page</title>
</head>

<body>



	<main class="main">
    <div class="container">
			<!-- Button trigger modal -->
			<button type="button" class="btn btn-primary btn-lg" data-toggle="modal" data-target="#myModal">
				Launch demo modal
			</button>
		</div>
	</main>

	<!-- Modal -->
	<div class="modal fade modal-blog" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
		<div class="modal-dialog" role="document">
			<div class="modal-content">
				<div class="modal-body">
					<button type="button" class="close visible-xs" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
					<div class="row modal-blog__row">
						<div class="col-sm-6 hidden-xs">
							<img src="https://media.wanderset.com/media/rjngvsnb4.modal-blog.jpg" alt="" class="w-100">
						</div>

						<div class="col-sm-6">
							<div class="modal-blog__content">
								<h2 class="modal-blog__title">"How I Used Writing<br class="hidden-xs"> To Get Promoted At<br class="hidden-xs"> My Job After 1 Month..."</h2>	
								<ul class="modal-blog__list">
									<li class="modal-blog__list__item"><i class="fa fa-check modal-blog__list__icon" aria-hidden="true"></i> How I engaged every person I wrote too</li>
									<li class="modal-blog__list__item"><i class="fa fa-check modal-blog__list__icon" aria-hidden="true"></i> What words insantly makes an impact</li>
									<li class="modal-blog__list__item"><i class="fa fa-check modal-blog__list__icon" aria-hidden="true"></i> How you can do the same!</li>
								</ul>	
								<form action="" class="modal-blog__form">
									<div class="form-group">
										<input type="email" class="form-control" placeholder="Enter email address">
										<i class="fa fa-envelope-o modal-blog__form__icon" aria-hidden="true"></i>
									</div>
									<button type="submit" class="modal-blog__form__btn">GET INSTANT ACCESS</button>
									<p class="modal-blog__form__info"><i class="fa fa-lock" aria-hidden="true"></i> Your information is never shared with anyone.</p>
								</form>
							</div>			
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>


	<script src="assets/javascript/vendors.min.js"></script>
	<script src="assets/javascript/scripts.js"></script>



</body>
</html>
