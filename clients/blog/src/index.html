					<div class="row modal-blog__row">

							<img src="https://media.wanderset.com/media/rjngvsnb4.modal-blog.jpg" alt="" class="w-100">

						<div class="col-sm-6">
							<div class="modal-blog__content">

									<li class="modal-blog__list__item"><i class="fa fa-check modal-blog__list__icon" aria-hidden="true"></i> What words insantly makes an impact</li>

								</ul>	
								<form action="" class="modal-blog__form">

									</div>

							</div>			
						</div>
					</div>
				</div>
