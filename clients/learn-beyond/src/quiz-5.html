<!doctype html>
<html lang="en">

<head>
	{{> head}}
	<title>{{siteName}} - Quiz 5</title>
</head>

<body>
	{{> header-quiz}}

	<main class="grow">
		<div class="px-4">
			<div class="space-y-4 text-center">
				<div class="quiz-progress">
					<div class="quiz-progress__bar" style="width: 25%;"></div>
				</div>
				<p class="text-sm md:text-bases">Progress: <strong>5/20</strong></p>
			</div>
		</div>
		<section class="py-16 md:py-24">
			<div class="container">
				<div class="space-y-4 sm:space-y-8">
					<div class="space-y-4 text-center">
						<h1 class="font-bold text-[22px] md:text-[28px]">How do you currently feel about math?</h1>
						<p class="text-gray-500">Select one that describes it best.</p>
					</div>
					<div class="space-y-5 mx-auto max-w-[590px]">
						<fieldset class="quiz-group">
							<label class="quiz-option group">
								<input type="radio" name="demo-goal" value="1" class="sr-only">
								<span class="quiz-option__label">I love it but want to get better</span>
								<span class="quiz-option__check" aria-hidden="true">
									<img src="./assets/images/icon-check-mark.svg" alt="Check Mark" class="size-5">
								</span>
							</label>

							<label class="quiz-option group">
								<input type="radio" name="demo-goal" value="2" class="sr-only">
								<span class="quiz-option__label">It’s okay, but I need help</span>
								<span class="quiz-option__check" aria-hidden="true">
									<img src="./assets/images/icon-check-mark.svg" alt="Check Mark" class="size-5">
								</span>
							</label>

							<label class="quiz-option group">
								<input type="radio" name="demo-goal" value="3" class="sr-only">
								<span class="quiz-option__label">I don’t like it, but I know it’s important</span>
								<span class="quiz-option__check" aria-hidden="true">
									<img src="./assets/images/icon-check-mark.svg" alt="Check Mark" class="size-5">
								</span>
							</label>

							<label class="quiz-option group">
								<input type="radio" name="demo-goal" value="4" class="sr-only">
								<span class="quiz-option__label">I feel completely stuck</span>
								<span class="quiz-option__check" aria-hidden="true">
									<img src="./assets/images/icon-check-mark.svg" alt="Check Mark" class="size-5">
								</span>
							</label>
						</fieldset>
					</div>

					<div class="text-center">
						<a href="#" class="btn btn-primary sm:px-14">Next</a>
					</div>
				</div>
			</div>
		</section>
	</main>

	<script type="module" src="./main.js"></script>
</body>

</html>
