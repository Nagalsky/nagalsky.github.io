<!doctype html>
<html lang="en">

<head>
	{{> head}}
	<title>{{siteName}} - Quiz 3</title>
</head>

<body>
	{{> header-quiz}}

	<main class="grow">
		<div class="px-4">
			<div class="space-y-4 text-center">
				<div class="quiz-progress">
					<div class="quiz-progress__bar" style="width: 15%;"></div>
				</div>
				<p class="text-sm md:text-bases">Progress: <strong>3/20</strong></p>
			</div>
		</div>
		<section class="py-16 md:py-24">
			<div class="container">
				<div class="space-y-4 sm:space-y-8">
					<div class="space-y-4 text-center">
						<h1 class="font-bold text-[22px] md:text-[28px]">What’s your main goal for using this math tutor?</h1>
						<p class="text-gray-500">Select all that apply.</p>
					</div>
					<div class="space-y-5 mx-auto max-w-[590px]">
						<fieldset class="quiz-group">
							<label class="quiz-option group">
								<input type="checkbox" name="demo-topics" value="1" class="sr-only">
								<span class="quiz-option__label">Improve grades in schoolImprove grades in school</span>
								<span class="quiz-option__check" aria-hidden="true">
									<img src="./assets/images/icon-check-mark.svg" alt="Check Mark" class="size-5">
								</span>
							</label>

							<label class="quiz-option group">
								<input type="checkbox" name="demo-topics" value="2" class="sr-only">
								<span class="quiz-option__label">Prepare for standardized tests (SAT, ACT, etc.)</span>
								<span class="quiz-option__check" aria-hidden="true">
									<img src="./assets/images/icon-check-mark.svg" alt="Check Mark" class="size-5">
								</span>
							</label>

							<label class="quiz-option group">
								<input type="checkbox" name="demo-topics" value="3" class="sr-only">
								<span class="quiz-option__label">Brush up on math for college or career</span>
								<span class="quiz-option__check" aria-hidden="true">
									<img src="./assets/images/icon-check-mark.svg" alt="Check Mark" class="size-5">
								</span>
							</label>

							<label class="quiz-option group">
								<input type="checkbox" name="demo-topics" value="4" class="sr-only">
								<span class="quiz-option__label">Solve specific problems (e.g., algebra, geometry)</span>
								<span class="quiz-option__check" aria-hidden="true">
									<img src="./assets/images/icon-check-mark.svg" alt="Check Mark" class="size-5">
								</span>
							</label>

							<label class="quiz-option group">
								<input type="checkbox" name="demo-topics" value="5" class="sr-only">
								<span class="quiz-option__label">Build confidence with math basics</span>
								<span class="quiz-option__check" aria-hidden="true">
									<img src="./assets/images/icon-check-mark.svg" alt="Check Mark" class="size-5">
								</span>
							</label>
						</fieldset>
					</div>

					<div class="text-center">
						<a href="#" class="btn btn-primary sm:px-14">Next</a>
					</div>
				</div>
			</div>
		</section>
	</main>

	<script type="module" src="./main.js"></script>
</body>

</html>
