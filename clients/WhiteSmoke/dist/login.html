<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<meta content="IE=edge" http-equiv="X-UA-Compatible">
	<meta name="format-detection" content="telephone=no">
	<link rel="icon" href="favicon.ico" type="image/x-icon"/>
	<link rel="shortcut icon" href="favicon.ico" type="image/x-icon"/>
	<title>Login page</title>
	<link rel="stylesheet" href="assets/stylesheets/main.css">
</head>

<body>

	<nav class="navbar navbar-toggleable-sm">
	  <button class="navbar-toggler navbar-toggler-right" type="button" data-toggle="collapse" data-target="#navbarContent" aria-controls="navbarContent" aria-expanded="false" aria-label="Toggle navigation">
	    <span class="white-smoke-icon-menu"></span>
	  </button>
	  <a class="navbar-brand" href="#">
	    <img src="assets/images/elements/logo.png" class="img-fluid" alt="">
	  </a>
	
	  <div class="collapse navbar-collapse" id="navbarContent">
	    <ul class="navbar-nav ml-auto mr-md-2 pt-3 pt-md-0">
	      <li class="nav-item dropdown">
	        <a class="nav-link dropdown-toggle dropdown-toggle--without-arrow px-md-4" href="#" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
	          <i class="white-smoke-icon-cog"></i>
	        </a>
	        <div class="dropdown-menu dropdown-menu-right dropdown-menu--has-arrow">
	          <a class="dropdown-item" href="#"><i class="white-smoke-icon-user"></i> Profile</a>
	          <a class="dropdown-item" href="#"><i class="white-smoke-icon-cog"></i> Settings</a>
	          <a class="dropdown-item" href="#"><i class="white-smoke-icon-logout-1"></i> Exit</a>
	        </div>
	      </li>
	      <li class="nav-item">
	        <a class="nav-link px-md-4" href="#">
	          <i class="white-smoke-icon-question-circle-o"></i>
	        </a>
	      </li>
	      <li class="nav-item">
	        <a class="nav-link px-md-4" href="#">
	          <i class="white-smoke-icon-logout"></i>
	        </a>
	      </li>
	    </ul>
	  </div>
	</nav>


	<main class="main has-bg has-bg--fixed d-flex justify-content-center align-items-center" style="background-image:url('assets/images/bg/bg-1.png');">

		<section class="section">
			<div class="container">
				<form action="" class="form-login">
					<img src="assets/images/elements/logo-content.png" class="img-fluid mx-auto d-block mb-3" alt="">
					<p class="text-center font-base-semibold text-blue">Everything You Need to Write Perfect English</p>
					<div class="form-group">
						<div class="input-group">
					    <div class="input-group-addon"><i class="white-smoke-icon-user"></i></div>
					    <input type="email" class="form-control" placeholder="Email">
					  </div><!--input-group-->
					</div><!--form-group-->

					<div class="form-group">
						<div class="input-group">
					    <div class="input-group-addon"><i class="white-smoke-icon-dot-3"></i></div>
					    <input type="password" class="form-control" placeholder="Password">
					  </div><!--input-group-->
					</div><!--form-group-->

					<div class="d-flex justify-content-between  align-items-center">
						<a href="#" class="font-base-semibold fs-13">Forgot my password</a>
						<button type="button" class="btn btn-sky btn-rounded">Login</button>
					</div>
				</form><!--form-login-->
			</div><!--container-->
		</section><!--section-->

	</main>


	<script src="../node_modules/jquery/dist/jquery.min.js"></script>
	<script src="../node_modules/tether/dist/js/tether.min.js"></script>
	<script src="../node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
	<script src="assets/javascript/scripts.js"></script>



</body>
</html>
