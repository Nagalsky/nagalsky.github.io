<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta name="format-detection" content="telephone=no">
  <link rel="stylesheet" href="css/main.css">
  <title>Account details page</title>
</head>

<body>
  <nav class="navbar navbar-expand-md fixed-top">
    <button class="navbar-toggler collapsed" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon" />
    </button>
  
    <a class="navbar-brand" href="#">
      <img src="img/elements/logo.svg" alt="" class="w-100">
    </a>
  
    <ul class="navbar-nav d-md-none">
      <li class="nav-item">
        <a class="nav-link text-uppercase text-white" href="#">
          <img src="img/icons/icon-login.png" class="nav-icon" alt=""> <b>James Taylor</b>
        </a>
      </li>
    </ul>
  
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <a class="nav-link nav-link--highlited" href="#">
            My profile
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">
            My vehicles
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">
            My drivers
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">
            Dashboard
          </a>
        </li>
        <li class="nav-item d-none d-md-inline-block ml-5">
          <a class="nav-link nav-link--highlited" href="#">
            <img src="img/icons/icon-login.png" class="nav-icon" alt=""> <b>James Taylor</b>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <main class="main d-md-flex align-items-center">
    <section class="section w-100">
      <div class="container">
        <div class="wrapper">
          <h1 class="title mb-5 text-center">Account details</h1>

          <form class="" action="" method="">
            <div class="form-group">
              <label for="field-details-email">E-mail</label>
              <div class="field-has-icon">
                <input type="email" class="form-control" placeholder="E-mail" id="field-details-email">
                <img src="img/icons/icon-email.png" alt="" class="field-icon">
              </div>
            </div>

            <div class="form-group">
              <label for="field-details-first-name">First Name</label>
              <div class="field-has-icon">
                <input type="text" class="form-control" placeholder="First Name" id="field-details-first-name">
                <img src="img/icons/icon-user.png" alt="" class="field-icon">
              </div>
            </div>

            <div class="form-group">
              <label for="field-details-last-name">Last Name</label>
              <div class="field-has-icon">
                <input type="text" class="form-control" placeholder="Last Name" id="field-details-last-name">
                <img src="img/icons/icon-user.png" alt="" class="field-icon">
              </div>
            </div>

            <div class="form-group">
              <label for="field-details-business">Business Name</label>
              <div class="field-has-icon">
                <input type="text" class="form-control" placeholder="Business Name" id="field-details-business">
                <img src="img/icons/icon-business.png" alt="" class="field-icon">
              </div>
            </div>

            <div class="form-group">
              <label for="field-details-address-1">Address 1</label>
              <input type="text" class="form-control" placeholder="Address 1" id="field-details-address-1">
            </div>

            <div class="form-group">
              <label for="field-details-address-2">Address 2</label>
              <input type="text" class="form-control" placeholder="Address 2" id="field-details-address-2">
            </div>

            <div class="form-group">
              <label for="field-detail-city">City</label>
              <input type="text" class="form-control" placeholder="City" id="field-detail-city">
            </div>

            <div class="form-group">
              <label for="field-detail-country">Country</label>
              <select class="selectpicker" data-width="100%" title="Country" data-style="btn-select" id="field-detail-country">
                <option>Selection 1</option>
                <option>Selection 2</option>
                <option>Selection 3</option>
              </select>
            </div>

            <div class="form-group">
              <label for="field-details-phone">Phone Number</label>
              <div class="field-has-icon">
                <input type="tel" class="form-control" placeholder="Phone Number" id="field-details-phone">
                <img src="img/icons/icon-phone.png" alt="" class="field-icon">
              </div>
            </div>

            <div class="form-group mb-5">
              <label for="field-details-mobile">Mobile Number</label>
              <div class="field-has-icon">
                <input type="tel" class="form-control" placeholder="Mobile Number" id="field-details-mobile">
                <img src="img/icons/icon-phone.png" alt="" class="field-icon">
              </div>
            </div>

            <h2 class="title text-center">Bank details</h2>
            <p class="text-center text-silver-soft mb-md-5 lead-sm">Please insert your bank details information below securely so that we can pay you directly for any CargoDesk jobs</p>

            <div class="form-group">
              <label for="field-details-bank-account-name">Bank Account Name</label>
              <div class="field-has-icon">
                <input type="text" class="form-control" placeholder="Bank Account Name" id="field-details-bank-account-name">
                <img src="img/icons/icon-user.png" alt="" class="field-icon">
              </div>
            </div>

            <div class="form-group">
              <label for="field-details-bank-account-number">Bank Account Number</label>
              <div class="field-has-icon">
                <input type="text" class="form-control" placeholder="Bank Account Number" id="field-details-bank-account-number">
                <img src="img/icons/icon-number.png" alt="" class="field-icon">
              </div>
            </div>

            <div class="form-group">
              <label for="field-details-bank-code">Bank Sort Code</label>
              <div class="field-has-icon">
                <input type="text" class="form-control" placeholder="Bank Sort Code" id="field-details-bank-code">
                <img src="img/icons/icon-code.png" alt="" class="field-icon">
              </div>
            </div>

            <div class="text-center px-5"><button type="submit" name="" class="btn btn-primary btn-block mt-5">Save</button></div>
          </form>
        </div>
        <!-- wrapper -->
      </div>
      <!-- container -->
    </section>
    <!-- section -->
  </main>

  <footer class="footer">
    <div class="container">
      <p>Copyright 2018 All rights Reserverd Cargodesk | Africa</p>
    </div>
  </footer>

  <script src="js/vendors.min.js"></script>
  <script src="js/scripts.js"></script>
</body>

</html>
