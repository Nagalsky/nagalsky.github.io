<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta name="format-detection" content="telephone=no">
  <link rel="stylesheet" href="css/main.css">
  <title>Forgot password page</title>
</head>

<body>
  <nav class="navbar navbar-expand-md fixed-top">
    <a class="navbar-brand" href="#">
      CARGODESK<br>
      .AFRICA
    </a>
  </nav>

  <main class="main d-md-flex align-items-center">
    <section class="section w-100 text-center">
      <div class="container">
        <div class="wrapper">
          <h1 class="h2">Reset your Password</h1>
          <p class="text-silver-soft mb-md-5 lead-sm">Dont need to do this? <a href="#" class="text-success underline">Login</a></p>

          <form class="" action="" method="">
            <div class="form-group">
              <div class="field-has-icon">
                <input type="email" class="form-control" placeholder="mail@mail.ru" id="">
                <img src="img/icons/icon-email.png" alt="" class="field-icon">
              </div>
            </div>

            <div class="form-group">
              <div class="field-has-icon">
                <input type="password" class="form-control" placeholder="Enter a new Password" id="">
                <img src="img/icons/icon-password.png" alt="" class="field-icon">
              </div>
            </div>

            <div class="form-group">
              <div class="field-has-icon">
                <input type="password" class="form-control" placeholder="Confirm Password" id="">
                <img src="img/icons/icon-password.png" alt="" class="field-icon">
              </div>
            </div>

            <button type="submit" name="" class="btn btn-primary btn-block mt-5">Reset password</button>
          </form>
        </div>
        <!-- wrapper -->
      </div>
      <!-- container -->
    </section>
    <!-- section -->
  </main>

  <footer class="footer">
    <div class="container">
      <p>Copyright 2018 All rights Reserverd Cargodesk | Africa</p>
    </div>
  </footer>

  <script src="js/vendors.min.js"></script>
  <script src="js/scripts.js"></script>
</body>

</html>
