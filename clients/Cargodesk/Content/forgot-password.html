<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta content="IE=edge" http-equiv="X-UA-Compatible">
  <meta name="format-detection" content="telephone=no">
  <link rel="stylesheet" href="css/main.css">
  <title>Forgot password page</title>
</head>

<body>
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="#">
        CARGODESK<br>
        .AFRICA
      </a>
    </div>
  </nav>

  <main class="main d-md-flex align-items-center">
    <section class="section w-100 text-center">
      <div class="container">
        <div class="wrapper">
          <h1 class="h2">Forgot Password?</h1>
          <p class="text-silver-soft mb-md-5 lead-sm">Dont worry just enter the e-mail address you registered with and we will send you a link to reset your password</p>

          <form class="" action="" method="">
            <div class="form-group">
              <div class="field-has-icon">
                <input type="email" class="form-control" placeholder="Enter your E-mail address" id="field-details-email">
                <img src="img/icons/icon-email.png" alt="" class="field-icon">
              </div>
            </div>
            <!-- form-group -->

            <button type="submit" name="" class="btn btn-primary btn-block mt-5">Send password reset link</button>
          </form>
        </div>
        <!-- wrapper -->
      </div>
      <!-- container -->
    </section>
    <!-- section -->
  </main>

  <footer class="footer">
    <div class="container">
      <p>Copyright 2018 All rights Reserverd Cargodesk | Africa</p>
    </div>
  </footer>

  <script src="js/vendors.min.js"></script>
  <script src="js/scripts.js"></script>
</body>

</html>
